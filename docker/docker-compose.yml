# Run a PurePrivacy box in one command:  docker compose up -d  &&  docker compose logs -f
# The box is reached only via its .onion (outbound Tor). The ONE published port is the
# first-run web setup page, bound to the HOST's 127.0.0.1 only (never the LAN) and dead
# once your phone has signed in. A named volume holds the box's identity (onion key, admin,
# secrets, pairings).
services:
  box:
    image: ${PP_IMAGE:-pureprivacy-box:dev}   # ./build.sh builds :dev; or PP_IMAGE=jaimemelon/pureprivacy-box:latest to pull from Docker Hub
    container_name: pureprivacy-box
    restart: unless-stopped
    environment:
      # Only needed for the scripted path (with PP_PASS). In the default web-setup flow you
      # choose the username in the browser, so leave this unset.
      PP_USER: "${PP_USER:-}"
      # Leave PP_PASS unset (default) for the interactive web-setup flow: open the setup
      # page (below) in your browser, choose a username + password, scan the QR. Set PP_PASS
      # to provision non-interactively instead (CI / scripted).
      PP_PASS: "${PP_PASS:-}"
      PP_BOX:  "${PP_BOX:-mybox}"
      # Stable key so secrets.json decrypts across restarts. Optional — a non-secret default
      # is used if unset. For a real box, generate + keep one:  PP_SECRETS_KEY=$(openssl rand -base64 32)
      PP_SECRETS_KEY: "${PP_SECRETS_KEY:-}"
    ports:
      # One-page web setup — HOST loopback only. On first run open http://127.0.0.1:8470/
      # in your browser. Closes itself once your phone signs in.
      - "127.0.0.1:8470:8470"
    volumes:
      - pp-data:/data
volumes:
  pp-data:
    # Per-install volume name. `pp-box init` generates a unique one into .env (PP_VOLUME) so
    # two boxes on one host can't collide. It must stay STABLE for the life of the box — this
    # volume holds the onion key; pointing at a different name = a new, empty box.
    # Existing installs (no PP_VOLUME in .env) keep the original name, so nothing is orphaned.
    name: ${PP_VOLUME:-pureprivacy-data}

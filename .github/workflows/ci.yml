# CI — build + check on every push / PR (Linux only; full matrix lives in release.yml)
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install pnpm via corepack
        run: |
          npm install -g corepack@latest
          corepack enable
          corepack prepare pnpm@latest-10 --activate
          pnpm --version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: svelte-check
        run: pnpm check

      # frontend must be built first: tauri's generate_context! embeds ../build
      - name: cargo check
        working-directory: src-tauri
        run: cargo check --locked

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --locked

      - name: Tauri build (deb + AppImage)
        run: pnpm tauri build --bundles deb appimage

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: pureprivacy-linux-x64
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
